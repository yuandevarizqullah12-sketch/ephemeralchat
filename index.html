<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EphemeralChat</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <script>
        // Redirect to login or chat based on localStorage
        const user = JSON.parse(localStorage.getItem('ephemeral_user') || 'null');
        if (user && user.userId) {
            window.location.href = 'chat.html';
        } else {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
