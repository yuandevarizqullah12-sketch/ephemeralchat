<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Settings – EphemeralChat</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="settings-container">
        <div class="settings-card">
            <h1>⚙️ Settings</h1>
            <div class="settings-item">
                <label>Username</label>
                <span id="settingsUsername"></span>
            </div>
            <div class="settings-item">
                <label>User ID (internal)</label>
                <span id="settingsUserId"></span>
            </div>
            <div class="settings-item">
                <label>Public ID (shareable)</label>
                <span id="settingsPublicId"></span>
                <button id="copyPublicIdBtn" class="small-btn">Copy</button>
            </div>
            <hr />
            <button id="logoutSettingsBtn" class="danger-btn">Logout</button>
            <button id="backToChatBtn" class="secondary-btn">← Back to Chat</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = JSON.parse(localStorage.getItem('ephemeral_session') || 'null');
            if (!session || !session.userId) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('settingsUsername').textContent = session.username;
            document.getElementById('settingsUserId').textContent = session.userId;
            document.getElementById('settingsPublicId').textContent = session.publicId || 'Not set';

            document.getElementById('copyPublicIdBtn').addEventListener('click', () => {
                const text = session.publicId || '';
                if (text) {
                    navigator.clipboard.writeText(text).then(() => {
                        window.showToast('Public ID copied!');
                    }).catch(() => {
                        // fallback
                        prompt('Copy this:', text);
                    });
                } else {
                    window.showToast('No public ID set.');
                }
            });

            document.getElementById('logoutSettingsBtn').addEventListener('click', () => {
                if (confirm('Logout?')) {
                    // Update online status to false
                    if (window.updateUserOnlineStatus) {
                        window.updateUserOnlineStatus(session.userId, false);
                    }
                    localStorage.removeItem('ephemeral_session');
                    window.location.href = 'login.html';
                }
            });

            document.getElementById('backToChatBtn').addEventListener('click', () => {
                window.location.href = 'chat.html';
            });
        });
    </script>
</body>
</html>
