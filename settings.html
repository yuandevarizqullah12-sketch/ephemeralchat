<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings – EphemeralChat</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="settings-container">
        <div class="settings-card">
            <h1>⚙️ Settings</h1>
            <div class="settings-item">
                <label>Name</label>
                <span id="settingsName"></span>
            </div>
            <div class="settings-item">
                <label>Your Public ID</label>
                <span id="settingsPublicId"></span>
                <button id="copyPublicIdBtn" class="small-btn">Copy</button>
            </div>
            <div class="settings-item">
                <label>Your User ID (internal)</label>
                <span id="settingsUserId" style="font-size:0.8rem;opacity:0.7;"></span>
            </div>
            <hr />
            <button id="logoutSettingsBtn" class="danger-btn">Logout</button>
            <button id="backToChatBtn" class="secondary-btn">← Back to Chat</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('ephemeral_user') || 'null');
            if (!user || !user.userId) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('settingsName').textContent = user.name;
            document.getElementById('settingsPublicId').textContent = user.publicId;
            document.getElementById('settingsUserId').textContent = user.userId;

            document.getElementById('copyPublicIdBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(user.publicId).then(() => {
                    window.showToast('Public ID copied!');
                });
            });

            document.getElementById('logoutSettingsBtn').addEventListener('click', () => {
                if (confirm('Logout?')) {
                    localStorage.removeItem('ephemeral_user');
                    window.location.href = 'login.html';
                }
            });

            document.getElementById('backToChatBtn').addEventListener('click', () => {
                window.location.href = 'chat.html';
            });
        });
    </script>
</body>
</html>
