<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengaturan - Ephemeral Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
</head>
<body>
    <div id="settingsApp" class="settings-container">
        <header class="settings-header">
            <a href="chat.html" class="btn-back">← Kembali</a>
            <h1>⚙️ Pengaturan</h1>
        </header>

        <main class="settings-main">
            <div class="settings-card glass">
                <div class="settings-item">
                    <label>Nama Tampilan</label>
                    <span id="displayNameDisplay" class="settings-value">-</span>
                </div>
                <div class="settings-item">
                    <label>Recovery ID</label>
                    <div class="recovery-row">
                        <span id="recoveryIdMasked" class="settings-value">••••••••</span>
                        <button id="showRecoveryBtn" class="btn-secondary btn-small">👁️ Tampilkan</button>
                        <button id="copyRecoverySettingsBtn" class="btn-secondary btn-small">📋 Salin</button>
                    </div>
                </div>
                <div class="settings-item">
                    <button id="clearLocalDataBtn" class="btn-danger btn-small">🗑️ Hapus Data Lokal</button>
                    <button id="logoutBtn" class="btn-danger btn-small">🚪 Keluar</button>
                </div>
                <div class="settings-item">
                    <p class="about-text">Ephemeral Chat v1.0 — Pesan otomatis hapus setelah 12 jam.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/settings.js"></script>
    <script type="module">
        import { initSettings } from './js/settings.js';
        initSettings();
    </script>
</body>
</html>
