<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EphemeralChat</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>💬 Chats</h2>
                <button id="newChatBtn" class="icon-btn">✚</button>
            </div>
            <div id="userInfo" class="user-info">
                <span id="sidebarUserName"></span>
                <button id="logoutSidebarBtn" class="icon-btn" title="Logout">⏻</button>
            </div>
            <div id="roomsList" class="rooms-list">
                <!-- dynamic rooms -->
            </div>
        </aside>

        <!-- Chat area -->
        <main id="chatArea">
            <div id="chatHeader" class="chat-header">
                <span id="chatPartnerName">Select a chat</span>
                <span id="chatPartnerStatus" class="status-dot offline"></span>
            </div>
            <div id="messagesContainer" class="messages-container">
                <!-- messages will be rendered here -->
                <div class="empty-chat">Select a contact to start messaging</div>
            </div>
            <div id="typingIndicator" class="typing-indicator" style="display:none;">typing...</div>
            <div class="chat-input-area">
                <textarea id="messageInput" rows="1" placeholder="Type a message..." maxlength="1000"></textarea>
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </main>
    </div>

    <!-- Firebase & Libs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- App scripts -->
    <script src="js/firebase.js"></script>
    <script src="js/encryption.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Ensure user is logged in
            const user = JSON.parse(localStorage.getItem('ephemeral_user') || 'null');
            if (!user || !user.userId) {
                window.location.href = 'login.html';
                return;
            }

            // Initialize chat
            window.initChat(user);
        });
    </script>
</body>
</html>
