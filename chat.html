<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ephemeral Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
</head>
<body>
    <div id="chatApp" class="chat-container">
        <header class="chat-header">
            <div class="header-left">
                <h1>💬 Ephemeral</h1>
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText" class="status-text">Online</span>
            </div>
            <div class="header-right">
                <a href="settings.html" class="btn-icon" title="Pengaturan">⚙️</a>
            </div>
        </header>

        <div class="chat-banner">
            <span>⏳ Pesan akan terhapus otomatis setelah 12 jam</span>
        </div>

        <main class="chat-main" id="chatMain">
            <div id="messageContainer" class="message-container">
                <!-- Pesan akan di-render di sini -->
                <div class="empty-state" id="emptyState">
                    <span>💬</span>
                    <p>Belum ada pesan. Mulai percakapan!</p>
                </div>
            </div>
        </main>

        <footer class="chat-footer">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Ketik pesan..." rows="1" maxlength="500"></textarea>
                <button id="sendBtn" class="btn-send" disabled>➤</button>
            </div>
            <div id="typingIndicator" class="typing-indicator" style="display:none;">Seseorang sedang mengetik...</div>
            <div id="spamWarning" class="spam-warning" style="display:none;">⚠️ Mohon tunggu 2 detik sebelum mengirim lagi.</div>
            <div id="sensitiveWarning" class="sensitive-warning" style="display:none;"></div>
        </footer>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/security.js"></script>
    <script type="module" src="js/validation.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module">
        import { initChat } from './js/chat.js';
        initChat();
    </script>
</body>
</html>
