<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login – EphemeralChat</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="login-container">
        <div class="auth-card">
            <h1>💬 EphemeralChat</h1>
            <p class="subtitle">Private & temporary messaging</p>

            <!-- Security warning -->
            <div class="warning-box">
                <h3>⚠️ Experimental App</h3>
                <ul>
                    <li>Not fully secure like WhatsApp</li>
                    <li>Messages expire after 12 hours</li>
                    <li>Use at your own risk</li>
                </ul>
                <label>
                    <input type="checkbox" id="agreeCheck" />
                    I understand
                </label>
            </div>

            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Your username" />
            </div>
            <div class="form-group">
                <label for="loginUserId">Your User ID (internal)</label>
                <input type="text" id="loginUserId" placeholder="Paste your user ID" />
            </div>
            <button id="loginBtn" disabled>Login</button>
            <div id="loginError" class="error-msg"></div>
            <p class="switch-auth">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Firebase & Libs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('loginUsername');
            const userIdInput = document.getElementById('loginUserId');
            const agreeCheck = document.getElementById('agreeCheck');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            function validate() {
                const username = usernameInput.value.trim();
                const userId = userIdInput.value.trim();
                loginBtn.disabled = !(agreeCheck.checked && username.length > 0 && userId.length > 0);
            }

            usernameInput.addEventListener('input', validate);
            userIdInput.addEventListener('input', validate);
            agreeCheck.addEventListener('change', validate);

            loginBtn.addEventListener('click', async () => {
                const username = usernameInput.value.trim();
                const userId = userIdInput.value.trim();
                loginError.textContent = '';

                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';

                try {
                    const user = await window.loginUser(username, userId);
                    if (user) {
                        // Save session
                        localStorage.setItem('ephemeral_session', JSON.stringify({
                            userId: user.userId,
                            username: user.username,
                            publicId: user.publicId || ''
                        }));
                        window.location.href = 'chat.html';
                    } else {
                        loginError.textContent = 'Invalid username or user ID. Please check and try again.';
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Login';
                    }
                } catch (e) {
                    loginError.textContent = 'Error: ' + e.message;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            });

            // If already logged in, redirect
            const session = JSON.parse(localStorage.getItem('ephemeral_session') || 'null');
            if (session && session.userId) {
                window.location.href = 'chat.html';
            }
        });
    </script>
</body>
</html>
